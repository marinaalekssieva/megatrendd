<svg viewBox="0 0 1000 500" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="background:#09090d; font-family: 'Outfit', 'Inter', -apple-system, sans-serif;">
  <defs>
    <!-- Blur filters -->
    <filter id="blur-medium">
      <feGaussianBlur stdDeviation="5" />
    </filter>
    <filter id="blur-heavy">
      <feGaussianBlur stdDeviation="8" />
    </filter>
    <!-- Card shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <!-- Gradients -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0e14"/>
      <stop offset="100%" stop-color="#08080c"/>
    </linearGradient>
    <linearGradient id="header-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="100%" stop-color="#111116"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fd8400" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#fd8400" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>

  <!-- Base Grid Background -->
  <rect width="1000" height="500" rx="16" fill="url(#bg-grad)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5"/>
  
  <!-- Grid Lines -->
  <g stroke="rgba(255, 255, 255, 0.02)" stroke-width="1">
    <line x1="50" y1="0" x2="50" y2="500" />
    <line x1="150" y1="0" x2="150" y2="500" />
    <line x1="250" y1="0" x2="250" y2="500" />
    <line x1="350" y1="0" x2="350" y2="500" />
    <line x1="450" y1="0" x2="450" y2="500" />
    <line x1="550" y1="0" x2="550" y2="500" />
    <line x1="650" y1="0" x2="650" y2="500" />
    <line x1="750" y1="0" x2="750" y2="500" />
    <line x1="850" y1="0" x2="850" y2="500" />
    <line x1="950" y1="0" x2="950" y2="500" />
    <line x1="0" y1="100" x2="1000" y2="100" />
    <line x1="0" y1="200" x2="1000" y2="200" />
    <line x1="0" y1="300" x2="1000" y2="300" />
    <line x1="0" y1="400" x2="1000" y2="400" />
  </g>

  <!-- Top Navigation Bar -->
  <rect x="0" y="0" width="1000" height="55" rx="16" fill="url(#header-grad)"/>
  <rect x="0" y="45" width="1000" height="10" fill="url(#header-grad)"/> <!-- seamless corner fix -->
  <line x1="0" y1="55" x2="1000" y2="55" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  
  <!-- Logo, Breadcrumbs, Status -->
  <circle cx="30" cy="28" r="8" fill="#fd8400" opacity="0.85"/>
  <circle cx="30" cy="28" r="4" fill="#ffffff"/>
  <text x="50" y="32" fill="#ffffff" font-size="14" font-weight="700" letter-spacing="0.5">Meta Ads Manager</text>
  <text x="195" y="31" fill="rgba(255,255,255,0.2)" font-size="14">/</text>
  <text x="215" y="32" fill="rgba(255,255,255,0.5)" font-size="12">Dragon Print (Кампания Преди)</text>
  
  <rect x="830" y="13" width="145" height="28" rx="6" fill="#1a1a24" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1"/>
  <text x="842" y="30" fill="rgba(255,255,255,0.7)" font-size="11" font-weight="600">Исторически данни</text>
  <path d="M952 22 l3 3 l3 -3" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>

  <!-- KPI CARDS CONTAINER -->
  <!-- KPI Card 1: Бюджет -->
  <rect x="35" y="80" width="210" height="90" rx="10" fill="#12121a" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
  <text x="55" y="110" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">ДНЕВЕН БЮДЖЕТ</text>
  <text x="55" y="145" fill="#ffffff" font-size="24" font-weight="800">30.00 €</text>

  <!-- KPI Card 2: Продажби -->
  <rect x="270" y="80" width="210" height="90" rx="10" fill="#12121a" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
  <text x="290" y="110" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">РЕЗУЛТАТИ (ПОКУПКИ)</text>
  <text x="290" y="145" fill="#ffffff" font-size="24" font-weight="800" filter="url(#blur-medium)">84</text>
  <text x="330" y="145" fill="#ffffff" font-size="20" font-weight="800" opacity="0.3">бр.</text>

  <!-- KPI Card 3: CPA (Цена за придобиване) -->
  <rect x="505" y="80" width="210" height="90" rx="10" fill="#12121a" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
  <text x="525" y="110" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">ЦЕНА ЗА РЕЗУЛТАТ (CPA)</text>
  <text x="525" y="145" fill="#ef4444" font-size="24" font-weight="800">14.28 €</text>

  <!-- KPI Card 4: ROAS -->
  <rect x="740" y="80" width="225" height="90" rx="10" fill="#12121a" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1" style="filter: drop-shadow(0px 4px 10px rgba(239, 68, 68, 0.05));"/>
  <text x="760" y="110" fill="rgba(255,255,255,0.4)" font-size="11" font-weight="700" letter-spacing="1">ВЪЗВРЪЩАЕМОСТ (ROAS)</text>
  <text x="760" y="145" fill="#ef4444" font-size="26" font-weight="900">2.80x</text>
  <text x="840" y="140" fill="rgba(239, 68, 68, 0.5)" font-size="11" font-weight="700">ПОД ЦЕЛТА</text>

  <!-- CHART SECTION -->
  <rect x="35" y="190" width="930" height="150" rx="10" fill="#12121a" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
  <text x="55" y="220" fill="rgba(255,255,255,0.7)" font-size="12" font-weight="700" letter-spacing="0.5">Ефективност по дни (Предишни кампании)</text>
  
  <!-- Line Chart Path (Flat/Declining trend) -->
  <path d="M 60 310 Q 150 290 250 300 T 450 310 T 650 290 T 850 305 T 940 315" fill="none" stroke="url(#line-grad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Chart Area fill -->
  <path d="M 60 310 Q 150 290 250 300 T 450 310 T 650 290 T 850 305 T 940 315 L 940 330 L 60 330 Z" fill="rgba(239, 68, 68, 0.05)" />
  
  <!-- Dots on Chart -->
  <circle cx="250" cy="300" r="4" fill="#ef4444"/>
  <circle cx="650" cy="290" r="4" fill="#ef4444"/>
  <circle cx="940" cy="315" r="4" fill="#ef4444"/>

  <!-- TABLE SECTION -->
  <rect x="35" y="360" width="930" height="115" rx="10" fill="#12121a" stroke="rgba(255, 255, 255, 0.04)" stroke-width="1"/>
  
  <!-- Table Header -->
  <text x="55" y="385" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="800" letter-spacing="0.5">СТАТУС</text>
  <text x="120" y="385" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="800" letter-spacing="0.5">ИМЕ НА КАМПАНИЯТА</text>
  <text x="400" y="385" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="800" letter-spacing="0.5">БЮДЖЕТ</text>
  <text x="530" y="385" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="800" letter-spacing="0.5">РЕЗУЛТАТИ</text>
  <text x="660" y="385" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="800" letter-spacing="0.5">ЦЕНА НА РЕЗУЛТАТ</text>
  <text x="800" y="385" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="800" letter-spacing="0.5">ИЗРАЗХОДВАНА СУМА</text>
  <text x="920" y="385" fill="rgba(255,255,255,0.3)" font-size="10" font-weight="800" letter-spacing="0.5">ROAS</text>
  
  <line x1="35" y1="395" x2="965" y2="395" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  
  <!-- Row 1 -->
  <circle cx="63" cy="417" r="4.5" fill="#10b981" style="filter: drop-shadow(0px 0px 4px #10b981);"/> <!-- Active dot -->
  <text x="120" y="421" fill="#ffffff" font-size="12" font-weight="700" filter="url(#blur-medium)">DP - Brand Awareness &amp; Traffic</text>
  <text x="400" y="421" fill="#ffffff" font-size="12" font-weight="600">15.00 € / ден</text>
  <text x="530" y="421" fill="#ffffff" font-size="12" filter="url(#blur-medium)">5,820 лийдове</text>
  <text x="660" y="421" fill="#ffffff" font-size="12">0.24 € / клик</text>
  <text x="800" y="421" fill="#ffffff" font-size="12" filter="url(#blur-medium)">4,821.50 €</text>
  <text x="920" y="421" fill="#ef4444" font-size="12" font-weight="700">1.10x</text>

  <!-- Row 2 -->
  <circle cx="63" cy="447" r="4.5" fill="#10b981" style="filter: drop-shadow(0px 0px 4px #10b981);"/> <!-- Active dot -->
  <text x="120" y="451" fill="#ffffff" font-size="12" font-weight="700" filter="url(#blur-medium)">DP - Catalog Sales - TOF</text>
  <text x="400" y="451" fill="#ffffff" font-size="12" font-weight="600">15.00 € / ден</text>
  <text x="530" y="451" fill="#ffffff" font-size="12" filter="url(#blur-medium)">84 покупки</text>
  <text x="660" y="451" fill="#ef4444" font-size="12">14.28 €</text>
  <text x="800" y="451" fill="#ffffff" font-size="12" filter="url(#blur-medium)">1,200.00 €</text>
  <text x="920" y="451" fill="#f59e0b" font-size="12" font-weight="700">2.80x</text>
</svg>
